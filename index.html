<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>站点更新通知</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft Yahei", sans-serif;
        }
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: #ffffff;
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.15);
            padding: 48px 32px;
            max-width: 500px;
            width: 100%;
            text-align: center;
        }
        h1 {
            color: #2d3748;
            font-size: 28px;
            margin-bottom: 24px;
            font-weight: 600;
        }
        .content {
            font-size: 18px;
            line-height: 2;
            color: #4a5568;
            margin-bottom: 32px;
        }
        .price {
            color: #e53e3e;
            font-weight: bold;
            font-size: 20px;
        }
        .contact {
            color: #2b6cb0;
            font-weight: bold;
        }
        .link-btn {
            display: inline-block;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #ffffff;
            text-decoration: none;
            padding: 14px 32px;
            border-radius: 8px;
            font-size: 18px;
            font-weight: 600;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }
        .link-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(102, 126, 234, 0.5);
        }
        @media (max-width: 480px) {
            .container {
                padding: 32px 20px;
            }
            h1 {
                font-size: 24px;
            }
            .content {
                font-size: 16px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>⚠️ 站点已更新</h1>
        <div class="content">
            <p>新网站已经更新，需要付费使用</p>
            <p class="price">1元 / 1个月</p>
            <p>需要联系：<span class="contact">Past0303</span></p>
        </div>
        <a href="https://riuqi.zhao03.top/" target="_blank" class="link-btn">
            点击访问新网站
        </a>
    </div>
</body>
</html>

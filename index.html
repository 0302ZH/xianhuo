<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>服务器到期提示</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft Yahei", sans-serif;
        }
        body {
            background-color: #fff;
            padding: 50px 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            border: 1px solid #e6e6e6;
            border-radius: 4px;
            overflow: hidden;
        }
        .header {
            background-color: #4CAF50;
            color: white;
            padding: 15px 20px;
            font-size: 22px;
            font-weight: 500;
        }
        .content {
            padding: 30px 25px;
            background-color: #f5f7f9;
        }
        .title {
            color: #f44336;
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 20px;
        }
        .divider {
            border-bottom: 1px dashed #ccc;
            margin-bottom: 25px;
        }
        .section-title {
            font-size: 18px;
            font-weight: bold;
            color: #333;
            margin: 20px 0 15px;
        }
        .list {
            font-size: 16px;
            line-height: 2;
            color: #333;
            padding-left: 25px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            服务器已到期
        </div>
        <div class="content">
            <div class="title">
                您的请求因服务器到期，暂时无法访问！
            </div>
            <div class="divider"></div>
            <div class="section-title">
                可能原因：
            </div>
            <ol class="list">
                <li>服务器已到期，未及时续费！</li>
                <li>域名或服务已被暂停！</li>
            </ol>
            <div class="section-title">
                如何解决：
            </div>
            <ol class="list">
                <li>请联系网站管理员进行服务器续费；</li>
                <li>确认域名及服务状态是否正常；</li>
                <li>普通网站访客，请联系网站管理员获取帮助。</li>
            </ol>
        </div>
    </div>
</body>
</html>
